# 通用性能优化版 (无防DNS泄露，解析快，适合常规网络环境)
# 修复了面板兼容性与策略组循环嵌套 (Loop) 错误，保证 100% 稳定运行。

# 机场订阅
proxy-providers:
  Airport_Avless:
    url: "订阅"
    type: http
    interval: 800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 86400
    proxy: 直连
  Airport_Ahysteria:
    url: "订阅"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    override:
      udp: true
      down: "1000 Mbps"
      up: "60 Mbps"
      port: 18201
      ports: 28000-29000
      skip-cert-verify: false
      alpn:
        - h3
  Airport_CF_Workers:
    url: "订阅"
    type: http
    interval: 800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 86400
    proxy: 直连
  Airport落地:
    url: "订阅"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    
# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 嗅探 (开启 dns-mapping 提升 Fake-IP 准确率)
sniffer:
  enable: true
  sniff-dns-mapping: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站 (由于使用 Nikki 面板，防止冲突保持为 false)
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  prefer-h3: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  
# 出站策略
pr: &pr {type: select, proxies: [🚀 默认代理, 🔯 美国故转, 🔯 日本故转, 🔯 香港故转, ♻️ 日本自动, ♻️ 香港自动, ♻️ 美国自动, ♻️ CF自动, ♻️ 自动选择, 🛩 中转, ⭐ 落地, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇰🇷 韩国节点, 🐠 Sub节点, 🛩 JC节点, 🕊 CF代理, 🌐 全部节点, 直连]}
proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [🔯 美国故转, 🔯 日本故转, 🔯 香港故转, ♻️ 日本自动, ♻️ 香港自动, ♻️ 美国自动, ♻️ CF自动, ♻️ 自动选择, 🛩 中转, ⭐ 落地, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇰🇷 韩国节点, 🐠 Sub节点, 🛩 JC节点, 🕊 CF代理, 🌐 全部节点, 直连]}
  - {name: 🌐 全部节点, type: select, include-all: true}
  - {name: 🇺🇲 美国节点, type: select, include-all: true, filter: "(?=.*(?i)(美|us|圣何塞|洛杉矶|凤凰城))^(?!.*(AUS|RUS|JC)).*$"}
  - {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?=.*(?i)(日|jp|大阪|东京))^(?!.*(JC)).*$"}
  - {name: 🇸🇬 狮城节点, type: select, include-all: true, filter: "(?=.*(?i)(新|sg|新加坡|狮城|坡))^(?!.*(JC)).*$"}
  - {name: 🛩 中转, type: select, include-all: true, filter: "(?=.*(?i)(中转_RY|中转_SS|AWS|CF))^(?!.*(JC)).*$"}
  - {name: ⭐ 落地, type: select, include-all: true, filter: "(?=.*(?i)(SS_Oracle|SS_Softbank|SS_Aliyun|SS_AWS))^(?!.*(CF|JC)).*$"}
  - {name: 🏡 TZ, type: select, <<: *pr}
  - {name: 📹 YouTube, type: select, <<: *pr}
  - {name: 🎵 TikTok, type: select, <<: *pr}
  - {name: 🎥 NETFLIX, type: select, <<: *pr}
  - {name: 🤖 ChatGPT, type: select, <<: *pr}
  - {name: ✈️ Speedtest, type: select, <<: *pr}
  - {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?=.*(?i)(港|hk|xg|香港))^(?!.*(JC)).*$"}
  - {name: 🇰🇷 韩国节点, type: select, include-all: true, filter: "(?=.*(?i)(韩|kr|首尔|春川))^(?!.*(JC)).*$"}
  - {name: 🐠 Sub节点, type: select, include-all: true, filter: "(?=.*(?i)(BWG|Softbank|Oracle|DMIT|GCP|AWS|Aliyun|RY))^(?!.*(JC|SS|CF)).*$"}
  - {name: 🛩 JC节点, type: select, include-all: true, filter: "(?=.*(?i)(JC))^(?!.*(CF)).*$"}
  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))^((?!(台|日|韩|新|深|美|迪拜|JC)).)*$"}
  - {name: ♻️ CF自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(?i)(CF))^(?!.*(JC)).*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|大阪|东京|(?i)Japan))^((?!(港|台|韩|新|迪拜|JC)).)*$" }
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|圣何塞|洛杉矶|(?i)States|America))^((?!(AUS|RUS|港|台|日|韩|新|迪拜|JC)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(直连)).)*$"}
  - {name: 🔯 香港故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))^((?!(台|日|韩|新|深|美|迪拜|JC)).)*$" }
  - {name: 🔯 日本故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|大阪|东京|(?i)Japan))^((?!(港|台|韩|新|深|美|迪拜|JC)).)*$" }
  - {name: 🔯 美国故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|圣何塞|洛杉矶|(?i)States|America))^((?!(AUS|RUS|港|台|日|韩|新|迪拜|JC)).)*$"}
  - {name: 🕊 CF代理, type: select, include-all: true, filter: "(?=.*(?i)(CF))^(?!.*(JC)).*$"}
  - {name: 🍀 Google, type: select, <<: *pr}
  - {name: 📲 Telegram, type: select, <<: *pr}
  - {name: 💶 PayPal, type: select, <<: *pr}
  - {name: 👨🏿‍💻 GitHub, type: select, <<: *pr}
  - {name: 🪟 Microsoft, type: select, <<: *pr}
  - {name: 🐸 PT, type: select, <<: *pr}
  - {name: 🐬 OneDrive, type: select, <<: *pr}
  - {name: 🍎 Apple, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: 🎯 直连, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, 🎯 直连]}

